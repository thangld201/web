name: Validate Content

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  validate-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Validate YAML content
        run: ruby scripts/validate_content.rb
