hero:
  title: Join Our Research Lab
  intro: Our lab is expanding, and we are looking for curious minds to join us as Postdocs, PhDs, and Master's students. If you are passionate about cutting-edge NLP and multimodal research, we invite you to consider the opportunities available with us.

